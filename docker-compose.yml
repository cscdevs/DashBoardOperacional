version: "3.7"
services:

## --------------------------- DASHBOARD CSC --------------------------- ##

  dashboard_frontend:
    image: dashboard-frontend:latest ## Imagem do Frontend (Build na VPS)
    networks:
      - pportz         ## Nome da rede externa do Traefik
      - dashboard_net  ## Rede interna para falar com o backend

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=pportz  ## LINHA ADICIONADA: Diz ao Traefik para usar esta rede
        - traefik.http.routers.dashboard_csc.rule=Host(`dashboard.csc.pportz.com.br`) ## Url do Dashboard
        - traefik.http.routers.dashboard_csc.entrypoints=websecure
        - traefik.http.routers.dashboard_csc.priority=10
        - traefik.http.routers.dashboard_csc.tls.certresolver=letsencryptresolver
        - traefik.http.routers.dashboard_csc.service=dashboard_frontend
        - traefik.http.services.dashboard_frontend.loadbalancer.server.port=80
        - traefik.http.services.dashboard_frontend.loadbalancer.passHostHeader=1

## --------------------------- BACKEND CSC ----------------------------- ##

  dashboard_backend:
    image: dashboard-backend:latest ## Imagem do Backend (Build na VPS)
    environment:
      - DB_SERVER=192.168.0.58
      - DB_PORT=1433
      - DB_DATABASE=SAR2G_WORKS_PRD
      - DB_USER=sar2g
      - DB_PASSWORD=works@#sar2g
      - DB_ENCRYPT=false
      - DB_TRUST_SERVER_CERTIFICATE=true
      - PORT=3001
      - CACHE_TTL_SECONDS=30
      - DATA_SOURCE=sqlserver
      - STC_BASE_URL=https://ap3.stc.srv.br/integration/prod
      - STC_KEY=7e0a6b6b42558761470d6269804fa428
      - STC_USER=webservice
      - STC_PASS=webservice
    networks:
      - dashboard_net  ## Rede interna exclusiva para comunicação do frontend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1G

## --------------------------- REDES ----------------------------------- ##

networks:
  pportz: ## Nome da rede do Traefik
    external: true
    name: pportz
    
  dashboard_net: ## Rede isolada que permite o Nginx do Frontend falar com o Backend
    driver: overlay
