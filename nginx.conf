server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Configuração crucial para o React Router (SPA)
    # Redireciona todas as rotas não encontradas (404) para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Otimização de cache para arquivos estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Proxy para o Backend Node.js (container "dashboard_backend" na mesma rede).
    # O backend roda em container (ver docker-compose-prd.yml) e alcança o
    # SQL Server interno (192.168.0.58) pela rede privada Tailscale (subnet
    # router). O host do VPS precisa de `tailscale up --accept-routes`.
    location /api/ {
        proxy_pass http://dashboard_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 130s;
    }
}
