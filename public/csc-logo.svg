<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="100%" height="100%">
  <defs>
    <linearGradient id="gradDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0660" />
      <stop offset="100%" stop-color="#1B0DAE" />
    </linearGradient>
    <linearGradient id="gradRoyal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B0DAE" />
      <stop offset="100%" stop-color="#3D2FD4" />
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#3A7BD5" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0a0660" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ícone Premium: Três anéis interligados (Representando C-S-C e Serviços Compartilhados) -->
  <g transform="translate(10, 30)" filter="url(#shadow)">
    <!-- Anel Esquerdo -->
    <rect x="0" y="20" width="46" height="46" rx="16" fill="none" stroke="url(#gradDeep)" stroke-width="10" />
    
    <!-- Anel Central (Elevado) -->
    <rect x="30" y="0" width="46" height="46" rx="16" fill="none" stroke="url(#gradRoyal)" stroke-width="10" />
    
    <!-- Anel Direito -->
    <rect x="60" y="20" width="46" height="46" rx="16" fill="none" stroke="url(#gradCyan)" stroke-width="10" />
  </g>
</svg>
